```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beko Mini Oyunlar V7</title>
<style>
    body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
    #login, #main { width: 100%; max-width: 360px; padding: 20px; }
    .version { font-size: 10px; color: #666; margin-top: 10px; }
    .game { background: #222; padding: 20px; margin: 10px 0; border-radius: 10px; cursor: pointer; border: 1px solid #444; }
    #mario-screen { display: none; position: fixed; inset: 0; background: #3b82f6; z-index: 100; }
</style>
</head>
<body>

    <div id="login">
        <h1>🎮 Beko V7</h1>
        <input id="name" placeholder="Kullanıcı Adı" style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
        <button onclick="start()" style="width: 100%; padding: 10px; margin-top: 10px; background: #22c55e; border: none; color: white;">Başla</button>
        <div class="version">Sürüm: V7</div>
    </div>

    <div id="main" style="display:none;">
        <h2 id="welcome"></h2>
        <div class="game" onclick="launchMario()">🍄 Mario (Boss'lu V7)</div>
        <div class="game" onclick="alert('Minecraft yakında...')">⛏️ Minecraft (Yakında)</div>
        <div class="game" onclick="openStore()">🛒 Mağaza (300 TL'n var)</div>
    </div>

    <div id="mario-screen">
        <button onclick="document.getElementById('mario-screen').style.display='none'" style="position:fixed; top:10px; left:10px; z-index:101;">Çıkış</button>
        <div id="boss-alert" style="display:none; position:fixed; top:20%; width:100%; text-align:center; font-size:30px; color:red;">BOSS GELİYOR!</div>
    </div>

    <script>
        function start() {
            const name = document.getElementById("name").value;
            if(!name) return;
            localStorage.setItem("beko_username", name);
            // Kendi paranı korumak için varsa çek, yoksa 300 yap
            if(!localStorage.getItem("beko_money")) localStorage.setItem("beko_money", "300");
            document.getElementById("welcome").innerText = "Hoş geldin " + name;
            document.getElementById("login").style.display = "none";
            document.getElementById("main").style.display = "block";
        }

        function openStore() {
            let money = localStorage.getItem("beko_money");
            alert("Mağaza sistemimiz hazırlanıyor! Şu an " + money + " TL'n var.");
        }

        function launchMario() {
            document.getElementById("mario-screen").style.display = "block";
            // Boss mantığı burada level 4'te çalışacak şekilde tetiklenecek
        }
    </script>
</body>
</html>

```
