<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Beko Mini Oyunlar - Tam Sürüm</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #game-view { width: 100vw; height: 100vh; background: linear-gradient(#5c94fc, #93c5fd); position: relative; }
        #mario { position: absolute; bottom: 50px; left: 60px; width: 40px; height: 48px; background: red; border-radius: 4px; z-index: 20; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 50px; background: #8b4513; border-top: 5px solid #22c55e; }
        .obstacle { position: absolute; bottom: 50px; width: 40px; height: 60px; background: #16a34a; border: 2px solid #064e3b; }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="menu-overlay">
        <h1>BEKO MARIO</h1>
        <input type="text" id="playerName" placeholder="Adın ne, Çipil?" style="padding:10px; margin:20px;">
        <button onclick="startCompleteGame()" style="padding:10px 30px; font-size:20px;">OYUNU BAŞLAT</button>
    </div>
    <div id="mario"></div>
    <div id="ground"></div>
</div>

<script>
    const gameView = document.getElementById('game-view');
    const mario = document.getElementById('mario');
    let gameActive = false;
    let velocityY = 0;
    let isJumping = false;

    function startCompleteGame() {
        document.getElementById('menu-overlay').style.display = 'none';
        gameActive = true;
        gameLoop();
        spawnLogic();
    }

    // ENGEL SPAWN MANTIĞI: TAM EKRAN SAĞ SINIRINDAN
    function spawnLogic() {
        if (!gameActive) return;
        
        const obstacle = document.createElement('div');
        obstacle.className = 'obstacle';
        // Tam ekran genişliğini al ve oradan başlat (Kritik nokta)
        let xPos = window.innerWidth;
        obstacle.style.left = xPos + 'px';
        gameView.appendChild(obstacle);

        function moveObstacle() {
            if (!gameActive) return;
            xPos -= 7; // Oyun hızı
            obstacle.style.left = xPos + 'px';

            // Çarpışma kontrolü
            if (xPos < 100 && xPos > 40 && parseInt(mario.style.bottom) < 110) {
                gameOver();
            }

            if (xPos < -60) obstacle.remove();
            else requestAnimationFrame(moveObstacle);
        }
        moveObstacle();
        setTimeout(spawnLogic, 1200 + Math.random() * 800);
    }

    function gameLoop() {
        if (!gameActive) return;
        // Basit yer çekimi simülasyonu
        if (isJumping) {
            velocityY -= 0.8;
            let currentBottom = parseInt(mario.style.bottom);
            mario.style.bottom = (currentBottom + velocityY) + 'px';
            if (currentBottom <= 50) {
                mario.style.bottom = '50px';
                isJumping = false;
                velocityY = 0;
            }
        }
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('mousedown', () => {
        if (!isJumping && gameActive) {
            isJumping = true;
            velocityY = 15;
        }
    });

    function gameOver() {
        gameActive = false;
        alert("Oyun bitti, Çipil!");
        location.reload();
    }
</script>
</body>
</html>
