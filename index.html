<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beko Mini Oyunlar</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#main{
    display:none;
}

input{
    padding:10px;
    font-size:18px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.game{
    background:#222;
    width:250px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
}

#ai{
    position:fixed;
    right:15px;
    bottom:15px;
    background:#333;
    padding:15px;
    border-radius:15px;
    width:220px;
}
</style>

</head>
<body>

<h1>🎮 Beko Mini Oyunlar</h1>

<div id="login">

<h2>Adını Gir</h2>

<input id="name" placeholder="Adın">

<br>

<button onclick="start()">Başla</button>

</div>

<div id="main">

<h2>Hoş geldin <span id="player"></span> 👋</h2>

<h2>💰 Para: <span id="money">1</span> TL</h2>

<div class="game">
<h2>🍄 Mario</h2>
<p>Yakında...</p>
</div>

<div class="game">
<h2>⛏️ Mini Minecraft 2D</h2>
<p>Yakında...</p>
</div>

</div>

<div id="ai">
🤖 <span id="message">Merhaba!</span>
</div>

<script>

function start(){

let isim=document.getElementById("name").value;

if(isim=="") return;

document.getElementById("player").innerHTML=isim;

document.getElementById("login").style.display="none";

document.getElementById("main").style.display="block";

}

let mesajlar=[
"Merhaba! 👋",
"Mario'yu denedin mi? 🍄",
"Mini Minecraft yakında! ⛏️",
"Bol şans! 🎮",
"TL kazanmaya devam et! 💰",
"Yeni oyunlar gelecek! ⭐",
"İyi eğlenceler! 😄",
"See you! 👋"
];

setInterval(function(){

let r=Math.floor(Math.random()*mesajlar.length);

document.getElementById("message").innerHTML=mesajlar[r];

},4000);

</script>

</body>
</html>
